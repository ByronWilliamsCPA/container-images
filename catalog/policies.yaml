apiVersion: v1
kind: ImagePolicies

metadata:
  schema_version: "1.0"
  description: Scanner and exception policies for the A2 image promotion pipeline
  maintainer: ByronWilliamsCPA/container-images
  last_updated: "2026-06-28"

# Vulnerability scanner policy applied by publish-approved-image.yml (A2).
# scripts/load_scanner_policy.py reads this file at promotion time and
# translates it into the concrete scanner knobs: the Snyk severity floor, the
# Trivy severity list, and the Cosign identity checks below.
#
# snyk / trivy action values:
#   block   -- promotion fails; image is not published to GHCR
#   warn    -- promotion continues; GitHub Actions warning annotation emitted
#   record  -- promotion continues; finding recorded in step summary only
#   ignore  -- finding suppressed entirely (use sparingly)

scanner_policy:
  snyk:
    critical: block
    high: block
    medium: warn
    low: record
  trivy:
    critical: block
    high: block
    medium: record
    low: ignore

  # Upstream Cosign signature check (dhi.io or gcr.io source images).
  # Set required: true only after confirming the upstream registry uses Cosign.
  #
  # expected_identity_regexp / expected_issuer_regexp pin WHO must have signed
  # the upstream image. The default ".*" accepts any Sigstore identity, which
  # only proves a signature exists, not that the trusted publisher produced it;
  # the workflow emits a warning whenever the identity is left unpinned.
  # #ASSUME the upstream signer identity is unknown until confirmed per source.
  # #VERIFY inspect an upstream signature with
  #   `cosign verify --certificate-identity-regexp ... <ref>` and replace ".*"
  #   with the publisher's Fulcio identity + OIDC issuer before relying on it.
  upstream_cosign:
    required: false
    advisory: true
    expected_identity_regexp: ".*"
    expected_issuer_regexp: ".*"

# Exception framework.
# Each entry grants a named exemption for a specific CVE on a specific image.
# Exceptions require: justification, ticket reference, and an expiry date.
# load_scanner_policy.py reads this list and, for the image being promoted,
# emits non-expired Trivy exceptions into a generated .trivyignore so Trivy
# stops blocking on them. Snyk exceptions are surfaced as a warning (Snyk
# suppresses by its own issue id, not by CVE, so they are not auto-applied).
# Expired or undated entries are ignored (fail-safe: the finding still blocks).
#
# Schema:
#   image_id:      str  -- matches catalog/images.yaml id field
#   cve_id:        str  -- CVE identifier (e.g. CVE-2024-12345)
#   scanner:       str  -- snyk | trivy | both
#   expires:       str  -- ISO-8601 date after which the exception auto-expires
#   ticket:        str  -- issue or ticket URL tracking the underlying fix
#   justification: str  -- reason this cannot be fixed by upgrading the base
exceptions: []
