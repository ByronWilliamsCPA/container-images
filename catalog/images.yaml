apiVersion: v1
kind: ImageCatalog

metadata:
  schema_version: "1.0"
  description: Approved container image catalog for homelab infrastructure
  maintainer: ByronWilliamsCPA/container-images
  last_updated: "2026-06-27"

# Each entry defines one image family version.
# Fields:
#   id:                       unique slug, kebab-case
#   display_name:             human-readable label
#   source_tier:              primary (DHI) | distroless (Google Distroless)
#   criticality:              critical | high | medium | low
#   classification_status:    classified | pending
#   disposition:              mirror_only | custom_derivative | decommission | exception_only
#   image_modification:
#     strategy:               mirror_only | replace_source | custom_derivative |
#                             runtime_only_hardening | debug_split | decommission | exception_only
#   upstream:
#     registry:               source registry hostname
#     name:                   image name (no registry prefix)
#     tag:                    upstream mutable tag
#   ghcr:
#     name:                   name in ghcr.io/byronwilliamscpa/
#     tag:                    tag to publish to GHCR
#   platform_compatibility:
#     default:                primary deploy platform
#     supported:              list of supported OCI platforms
#   notes:                    optional free-text

images:

  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------

  - id: dhi-postgres-17
    display_name: "DHI PostgreSQL 17"
    source_tier: primary
    criticality: high
    classification_status: classified
    disposition: mirror_only
    image_modification:
      strategy: mirror_only
    upstream:
      registry: dhi.io
      name: postgres
      # #ASSUME: DHI publishes postgres 17 under the same <major>-debian13 tag
      # convention as 14/16; confirmed available via the defenseunicorns DHI
      # mirror (ghcr.io/defenseunicorns-partnerships/dhi/postgres:17) currently
      # consumed by paperless and prefect.
      # #VERIFY: the mirror workflow resolves dhi.io/postgres:17-debian13; if the
      # tag is absent the matrix job for this entry fails loudly (fail-fast off).
      tag: "17-debian13"
    ghcr:
      name: dhi-postgres
      tag: "17-debian13"
    platform_compatibility:
      default: linux/amd64
      supported: [linux/amd64]
    notes: "PostgreSQL 17 base for paperless-ngx and prefect; replaces the third-party defenseunicorns DHI mirror."

  - id: dhi-postgres-16
