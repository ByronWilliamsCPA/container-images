# Security Analysis for container-images
#
# Runs inline security checks suited to this repo's content (Python scripts and
# YAML catalog data rather than a Python package). The final job
# "security-gate-validation" emits the check context "Security Gate Validation"
# required by the org default-branch ruleset.
name: Security Analysis

"on":
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]
  schedule:
    # Weekly scan on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  # ---------------------------------------------------------------------------
  # Script security: static analysis of Python scripts with Bandit
  # ---------------------------------------------------------------------------
  script-security:
    name: Script Security (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit --quiet

      - name: Run Bandit on scripts
        run: |
          if [ -d scripts ]; then
            bandit -r scripts/ -f txt
          else
            echo "No scripts directory found, skipping bandit"
          fi

  # ---------------------------------------------------------------------------
  # YAML security: lint catalog YAML for structural issues
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install yamllint
        run: pip install yamllint --quiet

      - name: Lint YAML files
        run: |
          YAML_DIRS=".github/workflows/"
          [ -d catalog ] && YAML_DIRS="$YAML_DIRS catalog/"
          yamllint $YAML_DIRS

  # ---------------------------------------------------------------------------
  # Aggregator: emits "Security Gate Validation" required by org ruleset
  # ---------------------------------------------------------------------------
  security-gate-validation:
    name: Security Gate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [script-security, yaml-lint]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check security scan results
        env:
          SCRIPT_RESULT: ${{ needs.script-security.result }}
          YAML_RESULT: ${{ needs.yaml-lint.result }}
        run: |
          echo "Script security: $SCRIPT_RESULT"
          echo "YAML lint:        $YAML_RESULT"

          if [ "$SCRIPT_RESULT" != "success" ] || [ "$YAML_RESULT" != "success" ]; then
            echo "::error::Security Gate Validation failed"
            exit 1
          fi
          echo "Security Gate Validation passed"
