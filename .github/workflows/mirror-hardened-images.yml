# yamllint disable rule:line-length
# =============================================================================
# Mirror Hardened Container Images to GHCR
# =============================================================================
# Mirrors hardened images from upstream registries (dhi.io, gcr.io) to
# GitHub Container Registry (ghcr.io/byronwilliamscpa/) as public repos.
#
# A0: Matrix is driven by catalog/images.yaml (not hardcoded inline).
#     Adding an image = one catalog entry.
# A1: Uses crane copy by digest (not docker pull/tag/push). The upstream
#     digest is resolved, then the copy is pinned to that digest, then the
#     target digest is asserted to match. No TOCTOU gap.
#
# Images are available without authentication:
#   docker pull ghcr.io/byronwilliamscpa/dhi-postgres:16-debian13
#
# Setup:
#   Org secrets: DHI_REGISTRY_USERNAME, DHI_REGISTRY_TOKEN
#   GitHub Environment: publish (holds DHI token, signing permissions)
# =============================================================================

name: Mirror Hardened Images to GHCR

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly, Sunday 2 AM UTC

  workflow_dispatch:
    inputs:
      force-update:
        description: 'Force update all images (ignore cache)'
        required: false
        type: boolean
        default: false

  push:
    branches:
      - main
    paths:
      - '.github/workflows/mirror-hardened-images.yml'
      - 'catalog/images.yaml'

# Serialize runs: killing a mirror mid-push could leave a partial tag in GHCR.
concurrency:
  group: mirror-hardened-images
  cancel-in-progress: false

env:
  CRANE_VERSION: "0.20.2"
  # In-repo checksum provides an independent trust anchor: even if the GitHub
  # release server is compromised, a modified binary will not match this value.
  # #ASSUME the crane release asset name and this sha256 stay valid for this
  # pinned version; GitHub release assets are immutable once published.
  # #VERIFY when bumping CRANE_VERSION, refresh CRANE_SHA256 from the release
  #   checksums.txt: `curl -sL .../v<ver>/checksums.txt | grep Linux_x86_64`.
  CRANE_SHA256: "c14340087103ba9dadf61d45acd20675490fd0ccbd56ac7901fc1b502137f44b"  # pragma: allowlist secret
  SYFT_VERSION: "v1.44.0"
  # #ASSUME anchore/syft:v1.44.0 resolves to the digest pinned below.
  # #VERIFY when bumping SYFT_VERSION, refresh SYFT_SHA256 with
  #   `crane digest anchore/syft:v<ver>` and update this value.
  SYFT_SHA256: "86fde6445b483d902fe011dd9f68c4987dd94e07da1e9edc004e3c2422650de6"  # pragma: allowlist secret

  # RT-1 interim kill-switch (ADR-012, homelab-infra): this live mirror copies a
  # MUTABLE upstream tag, so signing/attesting here mints this org's keyless
  # identity over bytes whose upstream signer was never verified (trust
  # laundering). Signing stays OFF until the shared `mirror-verify` reusable
  # workflow performs a fail-closed upstream-identity verification before
  # promotion. Flip to "true" only once that verification gates this job.
  # Copy + Trivy scan + SBOM generation still run while this is "false".
  MIRROR_SIGNING_ENABLED: "false"

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Prepare: Validate catalog and build image matrices
  # ===========================================================================
  prepare:
    name: Validate catalog + build matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      dhi_matrix: ${{ steps.build-matrix.outputs.dhi_matrix }}
      distroless_matrix: ${{ steps.build-matrix.outputs.distroless_matrix }}
      dhi_count: ${{ steps.build-matrix.outputs.dhi_count }}
      distroless_count: ${{ steps.build-matrix.outputs.distroless_count }}

    steps:
      # egress-policy: block deferred pending allowed-endpoints verification (see #18)
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install "pyyaml==6.0.3" --quiet

      - name: Validate catalog schema (exit gate)
        run: python3 scripts/validate_catalog_schema.py catalog/images.yaml

      - name: Build image matrices from catalog
        id: build-matrix
        run: python3 scripts/build_matrix.py catalog/images.yaml

  # ===========================================================================
  # Mirror DHI Images (A1: crane copy by digest)
  # ===========================================================================
  mirror-dhi:
    name: "Mirror DHI ${{ matrix.ghcr_name }}:${{ matrix.ghcr_tag }}"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: publish

    permissions:
      contents: read
      packages: write
      id-token: write  # keyless cosign signing
      security-events: write  # Trivy SARIF upload

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.dhi_matrix) }}

    steps:
      # egress-policy: block deferred pending allowed-endpoints verification (see #18)
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install crane (verify checksum before extraction)
        run: |
          CRANE_BASE="https://github.com/google/go-containerregistry/releases/download"
          CRANE_ASSET="go-containerregistry_Linux_x86_64.tar.gz"
          # --fail makes curl exit non-zero on HTTP 4xx/5xx instead of silently
          # writing the error body into the archive.
          curl --fail --show-error --silent --location \
            "${CRANE_BASE}/v${CRANE_VERSION}/${CRANE_ASSET}" -o crane.tar.gz
          # Verify against the sha256 pinned in this repo (independent trust
          # anchor) BEFORE extracting or executing the downloaded binary.
          echo "${CRANE_SHA256}  crane.tar.gz" | sha256sum --check
          tar xz -C /usr/local/bin crane < crane.tar.gz
          rm crane.tar.gz
          crane version

      - name: Mask registry credentials
        env:
          DHI_REGISTRY_USERNAME: ${{ secrets.DHI_REGISTRY_USERNAME }}
          DHI_REGISTRY_TOKEN: ${{ secrets.DHI_REGISTRY_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::add-mask::$DHI_REGISTRY_USERNAME"
          echo "::add-mask::$DHI_REGISTRY_TOKEN"
          echo "::add-mask::$GH_TOKEN"

      - name: Authenticate crane to registries
        env:
          DHI_USER: ${{ secrets.DHI_REGISTRY_USERNAME }}
          DHI_PASS: ${{ secrets.DHI_REGISTRY_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --password-stdin keeps the token out of the process argument list
          # (visible in /proc); matches the pattern in publish-approved-image.yml.
          printf '%s' "${DHI_PASS}" | \
            crane auth login dhi.io --username "${DHI_USER}" --password-stdin
          printf '%s' "${GHCR_PASS}" | \
            crane auth login ghcr.io --username "${GHCR_USER}" --password-stdin

      # A1: resolve exact upstream digest, copy content-addressed, assert equality
      - name: Resolve upstream digest and copy to GHCR
        id: copy
        env:
          UPSTREAM_REGISTRY: ${{ matrix.upstream_registry }}
          UPSTREAM_NAME: ${{ matrix.upstream_name }}
          UPSTREAM_TAG: ${{ matrix.upstream_tag }}
          GHCR_NAME: ${{ matrix.ghcr_name }}
          GHCR_TAG: ${{ matrix.ghcr_tag }}
          PLATFORM: ${{ matrix.platform }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_OWNER=$(echo "${GHCR_OWNER}" | tr '[:upper:]' '[:lower:]')
          SOURCE="${UPSTREAM_REGISTRY}/${UPSTREAM_NAME}:${UPSTREAM_TAG}"
          TARGET="ghcr.io/${GHCR_OWNER}/${GHCR_NAME}:${GHCR_TAG}"

          echo "Source: ${SOURCE}  Platform: ${PLATFORM}"
          echo "Target: ${TARGET}"

          # Resolve the exact platform digest from the upstream registry
          SOURCE_DIGEST=$(crane digest "${SOURCE}" --platform "${PLATFORM}")
          echo "Source digest: ${SOURCE_DIGEST}"

          # Copy content-addressed: upstream tag is mutable; the digest is not
          crane copy "${SOURCE}@${SOURCE_DIGEST}" "${TARGET}"

          # Assert: target must carry the same digest we resolved from source
          TARGET_DIGEST=$(crane digest "${TARGET}")
          if [ "${SOURCE_DIGEST}" != "${TARGET_DIGEST}" ]; then
            echo "::error::Digest mismatch!"
            echo "::error::  Source: ${SOURCE_DIGEST}"
            echo "::error::  Target: ${TARGET_DIGEST}"
            exit 1
          fi
          echo "Digest verified: ${SOURCE_DIGEST}"

          echo "source=${SOURCE}" >> "${GITHUB_OUTPUT}"
          echo "target=${TARGET}" >> "${GITHUB_OUTPUT}"
          echo "digest=${TARGET_DIGEST}" >> "${GITHUB_OUTPUT}"

          echo "| Image | \`${TARGET}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Source | \`${SOURCE}@${SOURCE_DIGEST}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Digest | \`${TARGET_DIGEST}\` |" >> "${GITHUB_STEP_SUMMARY}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ steps.copy.outputs.target }}@${{ steps.copy.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM with Syft
        id: sbom
        env:
          GHCR_NAME: ${{ matrix.ghcr_name }}
          TARGET: ${{ steps.copy.outputs.target }}
          DIGEST: ${{ steps.copy.outputs.digest }}
        run: |
          # Pull via digest so syft scans the exact promoted content.
          TARGET_WITH_DIGEST="${TARGET}@${DIGEST}"
          echo "Generating SBOM for ${TARGET_WITH_DIGEST}..."

          # #ASSUME anchore/syft:${SYFT_VERSION} resolves to the digest in SYFT_SHA256.
          # #VERIFY when bumping SYFT_VERSION, refresh SYFT_SHA256 with
          #   `crane digest anchore/syft:v<ver>` and update the env block.
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "anchore/syft:${SYFT_VERSION}@sha256:${SYFT_SHA256}" \
            "${TARGET_WITH_DIGEST}" \
            -o cyclonedx-json > "sbom-${GHCR_NAME}.json"

          COMPONENTS=$(jq '.components | length' "sbom-${GHCR_NAME}.json" 2>/dev/null || echo "N/A")
          echo "SBOM components: ${COMPONENTS}"
          echo "sbom_file=sbom-${GHCR_NAME}.json" >> "${GITHUB_OUTPUT}"

      - name: Sign image with Cosign
        if: github.ref == 'refs/heads/main' && env.MIRROR_SIGNING_ENABLED == 'true'
        env:
          TARGET: ${{ steps.copy.outputs.target }}
          DIGEST: ${{ steps.copy.outputs.digest }}
        run: |
          cosign sign --yes "${TARGET}@${DIGEST}"
          echo "Signed: ${TARGET}@${DIGEST}"

      - name: Attest SBOM
        if: github.ref == 'refs/heads/main' && steps.sbom.outputs.sbom_file != '' && env.MIRROR_SIGNING_ENABLED == 'true'
        env:
          TARGET: ${{ steps.copy.outputs.target }}
          DIGEST: ${{ steps.copy.outputs.digest }}
          SBOM_FILE: ${{ steps.sbom.outputs.sbom_file }}
        run: |
          cosign attest --yes \
            --predicate "${SBOM_FILE}" \
            --type cyclonedx \
            "${TARGET}@${DIGEST}"

  # ===========================================================================
  # Mirror Distroless Images (A1: crane copy by digest)
  # ===========================================================================
  mirror-distroless:
    name: "Mirror ${{ matrix.ghcr_name }}:${{ matrix.ghcr_tag }}"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: publish

    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write  # Trivy SARIF upload

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.distroless_matrix) }}

    steps:
      # egress-policy: block deferred pending allowed-endpoints verification (see #18)
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install crane (verify checksum before extraction)
        run: |
          CRANE_BASE="https://github.com/google/go-containerregistry/releases/download"
          CRANE_ASSET="go-containerregistry_Linux_x86_64.tar.gz"
          curl --fail --show-error --silent --location \
            "${CRANE_BASE}/v${CRANE_VERSION}/${CRANE_ASSET}" -o crane.tar.gz
          echo "${CRANE_SHA256}  crane.tar.gz" | sha256sum --check
          tar xz -C /usr/local/bin crane < crane.tar.gz
          rm crane.tar.gz
          crane version

      - name: Mask GitHub token
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "::add-mask::$GH_TOKEN"

      - name: Authenticate crane to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "${GHCR_PASS}" | \
            crane auth login ghcr.io --username "${GHCR_USER}" --password-stdin

      - name: Resolve upstream digest and copy to GHCR
        id: copy
        env:
          UPSTREAM_REGISTRY: ${{ matrix.upstream_registry }}
          UPSTREAM_NAME: ${{ matrix.upstream_name }}
          UPSTREAM_TAG: ${{ matrix.upstream_tag }}
          GHCR_NAME: ${{ matrix.ghcr_name }}
          GHCR_TAG: ${{ matrix.ghcr_tag }}
          PLATFORM: ${{ matrix.platform }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_OWNER=$(echo "${GHCR_OWNER}" | tr '[:upper:]' '[:lower:]')
          SOURCE="${UPSTREAM_REGISTRY}/${UPSTREAM_NAME}:${UPSTREAM_TAG}"
          TARGET="ghcr.io/${GHCR_OWNER}/${GHCR_NAME}:${GHCR_TAG}"

          echo "Source: ${SOURCE}  Platform: ${PLATFORM}"
          echo "Target: ${TARGET}"

          SOURCE_DIGEST=$(crane digest "${SOURCE}" --platform "${PLATFORM}")
          echo "Source digest: ${SOURCE_DIGEST}"

          crane copy "${SOURCE}@${SOURCE_DIGEST}" "${TARGET}"

          TARGET_DIGEST=$(crane digest "${TARGET}")
          if [ "${SOURCE_DIGEST}" != "${TARGET_DIGEST}" ]; then
            echo "::error::Digest mismatch!"
            echo "::error::  Source: ${SOURCE_DIGEST}"
            echo "::error::  Target: ${TARGET_DIGEST}"
            exit 1
          fi
          echo "Digest verified: ${SOURCE_DIGEST}"

          echo "source=${SOURCE}" >> "${GITHUB_OUTPUT}"
          echo "target=${TARGET}" >> "${GITHUB_OUTPUT}"
          echo "digest=${TARGET_DIGEST}" >> "${GITHUB_OUTPUT}"

          echo "| Image | \`${TARGET}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Source | \`${SOURCE}@${SOURCE_DIGEST}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Digest | \`${TARGET_DIGEST}\` |" >> "${GITHUB_STEP_SUMMARY}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ steps.copy.outputs.target }}@${{ steps.copy.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM with Syft
        id: sbom
        env:
          GHCR_NAME: ${{ matrix.ghcr_name }}
          TARGET: ${{ steps.copy.outputs.target }}
          DIGEST: ${{ steps.copy.outputs.digest }}
        run: |
          TARGET_WITH_DIGEST="${TARGET}@${DIGEST}"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "anchore/syft:${SYFT_VERSION}@sha256:${SYFT_SHA256}" \
            "${TARGET_WITH_DIGEST}" \
            -o cyclonedx-json > "sbom-${GHCR_NAME}.json"
          echo "sbom_file=sbom-${GHCR_NAME}.json" >> "${GITHUB_OUTPUT}"

      - name: Sign image with Cosign
        if: github.ref == 'refs/heads/main' && env.MIRROR_SIGNING_ENABLED == 'true'
        env:
          TARGET: ${{ steps.copy.outputs.target }}
          DIGEST: ${{ steps.copy.outputs.digest }}
        run: cosign sign --yes "${TARGET}@${DIGEST}"

      - name: Attest SBOM
        if: github.ref == 'refs/heads/main' && steps.sbom.outputs.sbom_file != '' && env.MIRROR_SIGNING_ENABLED == 'true'
        env:
          TARGET: ${{ steps.copy.outputs.target }}
          DIGEST: ${{ steps.copy.outputs.digest }}
          SBOM_FILE: ${{ steps.sbom.outputs.sbom_file }}
        run: |
          cosign attest --yes \
            --predicate "${SBOM_FILE}" \
            --type cyclonedx \
            "${TARGET}@${DIGEST}"

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: Mirror Summary
    needs: [prepare, mirror-dhi, mirror-distroless]
    runs-on: ubuntu-latest
    if: always()

    permissions:
      contents: read

    steps:
      # egress-policy: block deferred pending allowed-endpoints verification (see #18)
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate summary
        env:
          DHI_RESULT: ${{ needs.mirror-dhi.result }}
          DISTROLESS_RESULT: ${{ needs.mirror-distroless.result }}
          DHI_COUNT: ${{ needs.prepare.outputs.dhi_count }}
          DISTROLESS_COUNT: ${{ needs.prepare.outputs.distroless_count }}
          RUN_NUMBER: ${{ github.run_number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "# Image Mirror Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Run:** ${RUN_NUMBER} | **Trigger:** ${EVENT_NAME}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Job | Images | Status |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|-----|--------|--------|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| DHI (primary tier) | ${DHI_COUNT} | ${DHI_RESULT} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Distroless | ${DISTROLESS_COUNT} | ${DISTROLESS_RESULT} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Copy method:** crane copy by digest (A1)" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Matrix source:** catalog/images.yaml (A0)" >> "${GITHUB_STEP_SUMMARY}"

      - name: Check for failures
        env:
          DHI_RESULT: ${{ needs.mirror-dhi.result }}
          DISTROLESS_RESULT: ${{ needs.mirror-distroless.result }}
        run: |
          FAILED=0
          if [ "${DHI_RESULT}" != "success" ]; then
            echo "::error::DHI mirror job did not succeed (result: ${DHI_RESULT}). Check job logs for details."
            FAILED=1
          fi
          if [ "${DISTROLESS_RESULT}" != "success" ]; then
            echo "::error::Distroless mirror job did not succeed (result: ${DISTROLESS_RESULT}). Check job logs for details."
            FAILED=1
          fi
          if [ "${FAILED}" = "1" ]; then
            exit 1
          fi
