# =============================================================================
# Mirror Hardened Container Images to GHCR
# =============================================================================
# Mirrors hardened images from upstream registries (dhi.io, gcr.io) to
# GitHub Container Registry (ghcr.io/byronwilliamscpa/) as public repos.
#
# Images are available without authentication:
#   docker pull ghcr.io/byronwilliamscpa/dhi-postgres:16-debian13
#
# Setup:
#   Add org secrets DHI_REGISTRY_USERNAME and DHI_REGISTRY_TOKEN.
# =============================================================================

name: Mirror Hardened Images to GHCR

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly, Sunday 2 AM UTC

  workflow_dispatch:
    inputs:
      force-update:
        description: 'Force update all images (ignore cache)'
        required: false
        type: boolean
        default: false

  push:
    branches:
      - main
    paths:
      - '.github/workflows/mirror-hardened-images.yml'

# Serialize runs: killing a mirror mid-push could leave a partial tag in GHCR.
concurrency:
  group: mirror-hardened-images
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 1: Mirror DHI Images
  # ===========================================================================
  mirror-dhi:
    name: Mirror DHI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write
      id-token: write  # Required for keyless cosign signing

    strategy:
      fail-fast: false
      matrix:
        image:
          # Database images
          - {name: "postgres", tag: "16-debian13", ghcr_tag: "16-debian13"}
          - {name: "postgres", tag: "14-debian13", ghcr_tag: "14-debian13"}
          - {name: "redis", tag: "7-debian13", ghcr_tag: "7-debian13"}

          # Python images
          - {name: "python", tag: "3.12-debian13", ghcr_tag: "3.12-debian13"}
          - {name: "python", tag: "3.11-debian13", ghcr_tag: "3.11-debian13"}

          # Node.js images
          - {name: "node", tag: "24-debian13", ghcr_tag: "24-debian13"}
          - {name: "node", tag: "22-debian13", ghcr_tag: "22-debian13"}

          # Web server images
          # nginx 1.27 is debian12-only on DHI; switch once debian13 is published
          # #ASSUME: DHI will publish nginx 1.27 on debian13 once mainline stabilizes
          # #VERIFY: switch ghcr_tag from 1.27-debian12 to 1.27-debian13 once available
          - {name: "nginx", tag: "1.27", ghcr_tag: "1.27-debian12"}
          - {name: "nginx", tag: "1.26", ghcr_tag: "1.26-debian13"}

          # Infrastructure images
          - {name: "traefik", tag: "3.6-debian13", ghcr_tag: "3.6-debian13"}
          - {name: "traefik", tag: "3.5-debian13", ghcr_tag: "3.5-debian13"}
          - {name: "uptime-kuma", tag: "1-debian13", ghcr_tag: "1-debian13"}

          # Monitoring stack
          - {name: "grafana", tag: "12.3-debian13", ghcr_tag: "12.3-debian13"}
          - {name: "grafana", tag: "11.6-debian13", ghcr_tag: "11.6-debian13"}
          - {name: "prometheus", tag: "3.8-debian13", ghcr_tag: "3.8-debian13"}
          - {name: "prometheus", tag: "3.5-debian13", ghcr_tag: "3.5-debian13"}
          - {name: "loki", tag: "3.6-debian13", ghcr_tag: "3.6-debian13"}
          - {name: "loki", tag: "2.9-debian13", ghcr_tag: "2.9-debian13"}
          - {name: "promtail", tag: "3.5-debian13", ghcr_tag: "3.5-debian13"}
          - {name: "node-exporter", tag: "1-debian13", ghcr_tag: "1-debian13"}

          # Monitoring exporters (DHI uses upstream project names, not marketing names)
          - {name: "postgres-exporter", tag: "0-debian13", ghcr_tag: "0-debian13"}
          - {name: "redis-exporter", tag: "1-debian13", ghcr_tag: "1-debian13"}
          # Grafana Alloy: next-gen replacement for Promtail; DHI publishes as "alloy"
          - {name: "alloy", tag: "1-debian13", ghcr_tag: "1-debian13"}

          # Tooling
          - {name: "uv", tag: "0-debian13", ghcr_tag: "0-debian13"}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Mask DHI registry credentials
        run: |
          echo "::add-mask::${{ secrets.DHI_REGISTRY_USERNAME }}"
          echo "::add-mask::${{ secrets.DHI_REGISTRY_TOKEN }}"

      - name: Login to DHI Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USERNAME }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}

      - name: Mask GitHub token
        run: echo "::add-mask::${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, tag, and push to GHCR
        env:
          IMAGE_NAME: ${{ matrix.image.name }}
          IMAGE_TAG: ${{ matrix.image.tag }}
          IMAGE_GHCR_TAG: ${{ matrix.image.ghcr_tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          SOURCE="dhi.io/${IMAGE_NAME}:${IMAGE_TAG}"
          TARGET="ghcr.io/${GHCR_OWNER}/dhi-${IMAGE_NAME}:${IMAGE_GHCR_TAG}"

          echo "Mirroring: ${SOURCE} -> ${TARGET}"
          docker pull "${SOURCE}"
          docker tag "${SOURCE}" "${TARGET}"
          docker push "${TARGET}"

          echo "Image: ${TARGET}" >> "$GITHUB_STEP_SUMMARY"
          echo "Source: ${SOURCE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Generate and attest SBOM
        env:
          IMAGE_NAME: ${{ matrix.image.name }}
          IMAGE_GHCR_TAG: ${{ matrix.image.ghcr_tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          TARGET="ghcr.io/${GHCR_OWNER}/dhi-${IMAGE_NAME}:${IMAGE_GHCR_TAG}"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "${TARGET}" 2>/dev/null | cut -d'@' -f2 || echo "")

          if [ -z "$DIGEST" ]; then
            echo "Could not get image digest, skipping SBOM attestation"
            exit 0
          fi

          # anchore/syft v1.44.0 as of 2026-05-02
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:v1.44.0 \
            "${TARGET}" \
            -o cyclonedx-json > "sbom-${IMAGE_NAME}.json"

          cosign attest --yes \
            --predicate "sbom-${IMAGE_NAME}.json" \
            --type cyclonedx \
            "${TARGET}@${DIGEST}" || echo "SBOM attestation failed (non-fatal)"

          echo "SBOM: Attested" >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

  # ===========================================================================
  # Job 2: Mirror Google Distroless Images
  # ===========================================================================
  mirror-distroless:
    name: Mirror Distroless
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - {name: "python3-debian12", ghcr_name: "distroless-python3", tag: "latest"}
          - {name: "nodejs20-debian12", ghcr_name: "distroless-nodejs20", tag: "latest"}
          - {name: "static-debian12", ghcr_name: "distroless-static", tag: "latest"}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Mask GitHub token
        run: echo "::add-mask::${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, tag, and push
        env:
          IMAGE_NAME: ${{ matrix.image.name }}
          IMAGE_GHCR_NAME: ${{ matrix.image.ghcr_name }}
          IMAGE_TAG: ${{ matrix.image.tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          SOURCE="gcr.io/distroless/${IMAGE_NAME}:${IMAGE_TAG}"
          TARGET="ghcr.io/${GHCR_OWNER}/${IMAGE_GHCR_NAME}:${IMAGE_TAG}"

          echo "Mirroring: ${SOURCE} -> ${TARGET}"
          docker pull "${SOURCE}"
          docker tag "${SOURCE}" "${TARGET}"
          docker push "${TARGET}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Generate and attest SBOM
        env:
          IMAGE_GHCR_NAME: ${{ matrix.image.ghcr_name }}
          IMAGE_TAG: ${{ matrix.image.tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          TARGET="ghcr.io/${GHCR_OWNER}/${IMAGE_GHCR_NAME}:${IMAGE_TAG}"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' \
            "${TARGET}" 2>/dev/null | cut -d'@' -f2 || echo "")

          if [ -z "$DIGEST" ]; then
            echo "Could not get image digest, skipping SBOM attestation"
            exit 0
          fi

          # anchore/syft v1.44.0 as of 2026-05-02
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:v1.44.0 \
            "${TARGET}" \
            -o cyclonedx-json > "sbom-${IMAGE_GHCR_NAME}.json"

          cosign attest --yes \
            --predicate "sbom-${IMAGE_GHCR_NAME}.json" \
            --type cyclonedx \
            "${TARGET}@${DIGEST}" || echo "SBOM attestation failed (non-fatal)"

          echo "Image: ${TARGET}" >> "$GITHUB_STEP_SUMMARY"
          echo "SBOM: Attested" >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true

  # ===========================================================================
  # Job 3: Summary
  # ===========================================================================
  summary:
    name: Mirror Summary
    needs: [mirror-dhi, mirror-distroless]
    runs-on: ubuntu-latest
    if: always()

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate summary
        env:
          DHI_RESULT: ${{ needs.mirror-dhi.result }}
          DISTROLESS_RESULT: ${{ needs.mirror-distroless.result }}
          RUN_NUMBER: ${{ github.run_number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "# Image Mirror Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** ${RUN_NUMBER} | **Trigger:** ${EVENT_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| DHI Images | ${DHI_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Distroless Images | ${DISTROLESS_RESULT} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Check for failures
        env:
          DHI_RESULT: ${{ needs.mirror-dhi.result }}
        run: |
          if [ "${DHI_RESULT}" = "failure" ]; then
            echo "::error::Some image mirrors failed. Check job logs for details."
            exit 1
          fi
