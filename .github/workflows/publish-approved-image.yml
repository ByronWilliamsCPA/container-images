# =============================================================================
# Publish Approved Image (A2 Reusable Workflow)
# =============================================================================
# Reusable workflow_call workflow that promotes a container image through the
# full supply chain security pipeline before publishing it to GHCR.
#
# Pipeline stages (must all pass to promote):
#   1. Resolve upstream digest (crane, TOCTOU-safe)
#   2. Upstream Cosign check (identity/issuer + required flag from policies.yaml)
#   3. crane copy by digest to GHCR (single platform; multi-arch index warns)
#   4. Snyk container scan (thresholds + exceptions from catalog/policies.yaml)
#   5. Trivy container scan (thresholds + .trivyignore from catalog/policies.yaml)
#   6. Syft SBOM (CycloneDX JSON + SPDX JSON)
#   7. Cosign keyless sign + CycloneDX SBOM attestation
#   8. GitHub build provenance attestation
#   9. Write approved-lock.yaml entry (gated: main branch + write_lock input)
#
# Usage:
#   jobs:
#     promote-postgres:
#       uses: ByronWilliamsCPA/container-images/.github/workflows/publish-approved-image.yml@main
#       with:
#         image_id: dhi-postgres-16
#         upstream_registry: dhi.io
#         upstream_name: postgres
#         upstream_tag: "16-debian13"
#         ghcr_name: dhi-postgres
#         ghcr_tag: "16-debian13"
#       secrets:
#         DHI_REGISTRY_USERNAME: ${{ secrets.DHI_REGISTRY_USERNAME }}
#         DHI_REGISTRY_TOKEN: ${{ secrets.DHI_REGISTRY_TOKEN }}
#         SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
#
# Secrets:
#   DHI_REGISTRY_USERNAME  -- DHI pull credential (optional; omit for public sources)
#   DHI_REGISTRY_TOKEN     -- DHI pull credential (optional; omit for public sources)
#   SNYK_TOKEN             -- Snyk API token (optional; Snyk stages skip if absent)
#
# Required org secrets: none beyond the above  # pragma: allowlist secret
# Required environment: publish (holds signing OIDC trust)
# =============================================================================

name: Publish Approved Image

on:
  workflow_call:
    inputs:
      image_id:
        description: Catalog image id (matches catalog/images.yaml id field)
        required: true
        type: string
      upstream_registry:
        description: Source registry hostname (e.g. dhi.io or gcr.io)
        required: true
        type: string
      upstream_name:
        description: Image name on the upstream registry (e.g. hardened/postgres)
        required: true
        type: string
      upstream_tag:
        description: Upstream tag to resolve (e.g. 16-debian13)
        required: true
        type: string
      ghcr_name:
        description: Image name on GHCR, without registry prefix (e.g. dhi-postgres)
        required: true
        type: string
      ghcr_tag:
        description: Tag to publish on GHCR (e.g. 16-debian13)
        required: true
        type: string
      platform:
        description: Target platform (passed to crane digest --platform)
        required: false
        type: string
        default: linux/amd64
      write_lock:
        description: When true, commit the promotion entry to approved-lock.yaml (main only)
        required: false
        type: boolean
        default: true
      require_upstream_signature:
        description: Fail promotion if no upstream Cosign signature is found
        required: false
        type: boolean
        default: false
    secrets:
      DHI_REGISTRY_USERNAME:
        required: false
      DHI_REGISTRY_TOKEN:
        required: false
      SNYK_TOKEN:
        required: false
    outputs:
      promoted:
        description: "true when all gates passed and the image was published"
        value: ${{ jobs.promote.outputs.promoted }}
      target_ref:
        description: Full GHCR reference used for promotion (name:tag)
        value: ${{ jobs.promote.outputs.target_ref }}
      source_digest:
        description: sha256 digest resolved from the upstream registry
        value: ${{ jobs.promote.outputs.source_digest }}
      target_digest:
        description: sha256 digest confirmed on GHCR after crane copy
        value: ${{ jobs.promote.outputs.target_digest }}

env:
  # #ASSUME the crane release asset name and the sha256 below stay valid for
  # this pinned version; GitHub release assets are immutable once published.
  # #VERIFY when bumping CRANE_VERSION, refresh CRANE_SHA256 from the release
  #   checksums.txt: `curl -sL .../v<ver>/checksums.txt | grep Linux_x86_64`.
  CRANE_VERSION: "0.20.2"
  # Published crane release checksum (not a secret); verified before extraction.
  CRANE_SHA256: "c14340087103ba9dadf61d45acd20675490fd0ccbd56ac7901fc1b502137f44b"  # pragma: allowlist secret

jobs:
  # ===========================================================================
  # Promote: run all security gates and publish the image
  # ===========================================================================
  promote:
    name: Promote ${{ inputs.image_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: publish

    permissions:
      contents: read
      packages: write
      id-token: write      # OIDC for keyless Cosign + GitHub attestation
      attestations: write  # actions/attest-build-provenance
      security-events: write  # Trivy + Snyk SARIF upload

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    outputs:
      promoted: ${{ steps.set-outputs.outputs.promoted }}
      target_ref: ${{ steps.set-outputs.outputs.target_ref }}
      source_digest: ${{ steps.set-outputs.outputs.source_digest }}
      target_digest: ${{ steps.set-outputs.outputs.target_digest }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # persist-credentials: false -- this job uploads SBOM artifacts and never
      # uses git auth (crane/docker/OIDC handle registry auth), so a persisted
      # checkout token must not leak into those artifacts (zizmor artipacked).
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # ---- crane install + verify ------------------------------------------

      - name: Install and verify crane
        run: |
          CRANE_BASE="https://github.com/google/go-containerregistry/releases/download"
          CRANE_ASSET="go-containerregistry_Linux_x86_64.tar.gz"
          # --fail makes curl exit non-zero on an HTTP 4xx/5xx instead of
          # silently writing the error body into crane.tar.gz.
          curl --fail --show-error --silent --location \
            "${CRANE_BASE}/v${CRANE_VERSION}/${CRANE_ASSET}" -o crane.tar.gz
          # Verify against the sha256 pinned in this repo (an independent trust
          # anchor) BEFORE extracting or executing the downloaded binary.
          echo "${CRANE_SHA256}  crane.tar.gz" | sha256sum --check
          tar xz -C /usr/local/bin crane < crane.tar.gz
          rm crane.tar.gz
          crane version

      # ---- cosign install ---------------------------------------------------

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # ---- credentials -------------------------------------------------------

      # GITHUB_TOKEN is auto-masked by the runner; only the DHI token needs it.
      - name: Mask registry credentials
        env:
          DHI_PASS: ${{ secrets.DHI_REGISTRY_TOKEN }}
        run: |
          if [ -n "${DHI_PASS}" ]; then
            echo "::add-mask::${DHI_PASS}"
          fi

      - name: Authenticate crane to registries
        env:
          DHI_USER: ${{ secrets.DHI_REGISTRY_USERNAME }}
          DHI_PASS: ${{ secrets.DHI_REGISTRY_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REGISTRY: ${{ inputs.upstream_registry }}
        run: |
          # --password-stdin keeps the token out of the process argument list
          # (visible in /proc and CI logs); matches the docker login step below.
          if [ "${UPSTREAM_REGISTRY}" = "dhi.io" ] && [ -n "${DHI_USER}" ] && [ -n "${DHI_PASS}" ]; then
            printf '%s' "${DHI_PASS}" | \
              crane auth login dhi.io --username "${DHI_USER}" --password-stdin
          fi
          printf '%s' "${GHCR_PASS}" | \
            crane auth login ghcr.io --username "${GHCR_USER}" --password-stdin

      - name: Authenticate Docker to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_PASS}" | \
            docker login ghcr.io --username "${GHCR_USER}" --password-stdin

      # ---- resolve upstream digest ------------------------------------------
      # #ASSUME the upstream tag resolves to a stable digest between this step
      # and the crane copy below; copying by the resolved digest pins the bytes.
      # #VERIFY the post-copy digest assertion in "Copy image by digest" fails
      #   the job if the GHCR digest differs from the one resolved here.

      - name: Resolve upstream digest
        id: resolve
        env:
          PLATFORM: ${{ inputs.platform }}
          UPSTREAM_REGISTRY: ${{ inputs.upstream_registry }}
          UPSTREAM_NAME: ${{ inputs.upstream_name }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          GHCR_NAME: ${{ inputs.ghcr_name }}
          GHCR_TAG: ${{ inputs.ghcr_tag }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          SOURCE="${UPSTREAM_REGISTRY}/${UPSTREAM_NAME}:${UPSTREAM_TAG}"
          GHCR_REF="ghcr.io/${OWNER}/${GHCR_NAME}:${GHCR_TAG}"
          GHCR_IMAGE="ghcr.io/${OWNER}/${GHCR_NAME}"

          echo "Resolving digest for ${SOURCE} (platform: ${PLATFORM})..."
          SOURCE_DIGEST=$(crane digest "${SOURCE}" --platform "${PLATFORM}")
          echo "Source digest: ${SOURCE_DIGEST}"

          # Validate the digest shape before persisting it to GITHUB_ENV; a
          # malformed value (e.g. one containing a newline) could otherwise
          # smuggle extra environment lines into later steps.
          if ! printf '%s' "${SOURCE_DIGEST}" | grep -qE '^sha256:[0-9a-f]{64}$'; then
            echo "::error::Resolved digest is not a valid sha256: ${SOURCE_DIGEST}"
            exit 1
          fi

          echo "upstream_ref=${SOURCE}"        >> "${GITHUB_ENV}"
          echo "ghcr_ref=${GHCR_REF}"          >> "${GITHUB_ENV}"
          echo "ghcr_image=${GHCR_IMAGE}"       >> "${GITHUB_ENV}"
          echo "source_digest=${SOURCE_DIGEST}" >> "${GITHUB_ENV}"

          echo "upstream_ref=${SOURCE}"        >> "${GITHUB_OUTPUT}"
          echo "ghcr_ref=${GHCR_REF}"          >> "${GITHUB_OUTPUT}"
          echo "source_digest=${SOURCE_DIGEST}" >> "${GITHUB_OUTPUT}"

      # ---- load scanner policy (catalog/policies.yaml is the source of truth) -

      - name: Load scanner policy
        id: policy
        env:
          IMAGE_ID: ${{ inputs.image_id }}
        run: |
          # pyyaml is a declared project dependency; pin the runtime install so
          # an unexpected upstream release cannot enter a privileged job.
          pip install --quiet "pyyaml==6.0.3"
          python3 scripts/load_scanner_policy.py \
            --policy-file catalog/policies.yaml \
            --image-id "${IMAGE_ID}" \
            --trivyignore-out .trivyignore

      # ---- upstream Cosign check (policy-driven identity + required flag) ----

      - name: Check upstream Cosign signature
        env:
          REQUIRE_INPUT: ${{ inputs.require_upstream_signature }}
          REQUIRE_POLICY: ${{ steps.policy.outputs.cosign_required }}
          IDENTITY: ${{ steps.policy.outputs.cosign_identity_regexp }}
          ISSUER: ${{ steps.policy.outputs.cosign_issuer_regexp }}
          IDENTITY_PINNED: ${{ steps.policy.outputs.cosign_identity_pinned }}
        run: |
          SIGNED_REF="${upstream_ref}@${source_digest}"
          REQUIRE="false"
          if [ "${REQUIRE_INPUT}" = "true" ] || [ "${REQUIRE_POLICY}" = "true" ]; then
            REQUIRE="true"
          fi

          # An unpinned identity verifies only that *a* signature exists, not
          # that the trusted publisher produced it. Warn loudly so a "required"
          # check is not mistaken for real identity assurance.
          if [ "${IDENTITY_PINNED}" != "true" ]; then
            echo "::warning::Upstream Cosign identity is not pinned (regexp '.*'):" \
              "this checks signature presence only, NOT the signer. Set" \
              "expected_identity_regexp/expected_issuer_regexp in catalog/policies.yaml."
          fi

          # Capture stderr so a failed verification (tampered signature, network
          # error) is reported distinctly from a genuinely absent signature.
          COSIGN_ERR="$(mktemp)"
          if cosign verify \
              --certificate-identity-regexp="${IDENTITY}" \
              --certificate-oidc-issuer-regexp="${ISSUER}" \
              "${SIGNED_REF}" 2>"${COSIGN_ERR}"; then
            echo "::notice::Upstream Cosign signature verified: ${SIGNED_REF}"
          else
            DETAIL="$(head -c 300 "${COSIGN_ERR}" | tr '\n' ' ')"
            MSG="Upstream Cosign verification failed for ${SIGNED_REF}: ${DETAIL}"
            if [ "${REQUIRE}" = "true" ]; then
              echo "::error::${MSG} (signature required)"
              rm -f "${COSIGN_ERR}"
              exit 1
            fi
            echo "::warning::${MSG} (advisory; promotion continues)"
          fi
          rm -f "${COSIGN_ERR}"

      # ---- crane copy with digest assertion ---------------------------------

      - name: Copy image by digest to GHCR
        id: copy
        env:
          PLATFORM: ${{ inputs.platform }}
        run: |
          # source_digest is the platform-specific child digest, so this copies
          # a single architecture. Warn if the upstream tag is a multi-arch
          # index, because the other architectures are not mirrored.
          if crane manifest "${upstream_ref}" 2>/dev/null \
              | jq -e '.manifests' >/dev/null 2>&1; then
            echo "::warning::${upstream_ref} is a multi-arch image index;" \
              "only platform ${PLATFORM} is promoted to GHCR." \
              "Other architectures are not mirrored."
          fi

          echo "Copying ${upstream_ref}@${source_digest} -> ${ghcr_ref}..."
          crane copy "${upstream_ref}@${source_digest}" "${ghcr_ref}"

          TARGET_DIGEST=$(crane digest "${ghcr_ref}" --platform "${PLATFORM}")
          if [ "${source_digest}" != "${TARGET_DIGEST}" ]; then
            echo "::error::Digest mismatch after crane copy!"
            echo "::error::  Source: ${source_digest}"
            echo "::error::  Target: ${TARGET_DIGEST}"
            exit 1
          fi

          echo "Digest verified: ${TARGET_DIGEST}"
          echo "target_digest=${TARGET_DIGEST}" >> "${GITHUB_ENV}"
          echo "target_digest=${TARGET_DIGEST}" >> "${GITHUB_OUTPUT}"

          {
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${ghcr_ref}\` |"
            echo "| Source | \`${upstream_ref}@${source_digest}\` |"
            echo "| Digest | \`${TARGET_DIGEST}\` |"
            echo "| Platform | \`${PLATFORM}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      # ---- Snyk (optional: skipped when SNYK_TOKEN is absent) ---------------

      - name: Snyk gate (Critical and High block)
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          image: ${{ env.ghcr_ref }}@${{ env.target_digest }}
          args: >-
            --severity-threshold=${{ steps.policy.outputs.snyk_threshold }}
            --sarif-file-output=snyk-high.sarif

      - name: Snyk medium warning
        if: env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
          TARGET_WITH_DIGEST: ${{ env.ghcr_ref }}@${{ env.target_digest }}
          IMAGE_ID: ${{ inputs.image_id }}
          SNYK_EXCEPTIONS: ${{ steps.policy.outputs.snyk_exception_cves }}
        run: |
          # Distinguish "scan found zero medium issues" from "scan did not run".
          # A failed scan must NOT be reported as a clean 0; that would let a
          # scanner outage masquerade as a clean image in a security gate.
          set +e
          SNYK_JSON="$(snyk container test "${TARGET_WITH_DIGEST}" \
            --severity-threshold=medium --json 2>snyk-medium-err.log)"
          SNYK_RC=$?
          set -e
          # snyk rc: 0 = none at/above threshold, 1 = found, 2 = error,
          # 3 = no supported target.
          if [ "${SNYK_RC}" -ge 2 ]; then
            DETAIL="$(tail -n1 snyk-medium-err.log 2>/dev/null)"
            echo "::warning::Snyk medium scan did not complete (rc=${SNYK_RC}) for" \
              "${IMAGE_ID}: ${DETAIL}. Treated as UNKNOWN, not zero."
          else
            MEDIUM_COUNT="$(printf '%s' "${SNYK_JSON}" \
              | jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' \
              2>/dev/null)"
            if printf '%s' "${MEDIUM_COUNT}" | grep -qE '^[0-9]+$' \
                && [ "${MEDIUM_COUNT}" -gt 0 ]; then
              echo "::warning::Snyk: ${MEDIUM_COUNT} medium-severity issue(s) in" \
                "${IMAGE_ID} (policy: warn, not blocking)."
            elif printf '%s' "${MEDIUM_COUNT}" | grep -qE '^[0-9]+$'; then
              echo "Snyk medium check: 0 medium-severity issues."
            else
              echo "::warning::Snyk medium count unparseable for ${IMAGE_ID};" \
                "treated as UNKNOWN, not zero."
            fi
          fi
          if [ -n "${SNYK_EXCEPTIONS}" ]; then
            echo "::warning::Snyk CVE exceptions for ${IMAGE_ID} (${SNYK_EXCEPTIONS})" \
              "are NOT auto-suppressed; Snyk ignores by issue id, not CVE." \
              "Verify them manually."
          fi
        continue-on-error: true

      # hashFiles guard: if the Snyk gate failed before writing its SARIF, skip
      # the upload so a missing-file error does not mask the real Snyk failure.
      - name: Upload Snyk SARIF to Security tab
        if: always() && env.SNYK_TOKEN != '' && hashFiles('snyk-high.sarif') != ''
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: snyk-high.sarif
          category: snyk-${{ inputs.image_id }}

      # ---- Trivy (always required) ------------------------------------------

      - name: Trivy gate (Critical and High block)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.ghcr_ref }}@${{ env.target_digest }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          severity: ${{ steps.policy.outputs.trivy_severities }}
          trivyignores: ${{ steps.policy.outputs.trivyignore_file }}

      - name: Upload Trivy SARIF to Security tab
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.image_id }}

      # ---- SBOM generation --------------------------------------------------
      # #ASSUME the anchore/syft digest below matches tag v1.44.0; a digest pin
      # prevents a re-tagged image from running with docker-socket access.
      # #VERIFY when bumping the syft version, refresh the digest with
      #   `crane digest anchore/syft:v<ver>` and update both run steps.

      - name: Generate CycloneDX SBOM (Syft)
        id: sbom-cdx
        env:
          TARGET_WITH_DIGEST: ${{ env.ghcr_ref }}@${{ env.target_digest }}
          IMAGE_ID: ${{ inputs.image_id }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:v1.44.0@sha256:86fde6445b483d902fe011dd9f68c4987dd94e07da1e9edc004e3c2422650de6 \
            "${TARGET_WITH_DIGEST}" \
            -o cyclonedx-json \
            > "sbom-${IMAGE_ID}-cyclonedx.json"

          COMPONENTS=$(jq '.components | length' "sbom-${IMAGE_ID}-cyclonedx.json" 2>/dev/null || echo "N/A")
          echo "CycloneDX components: ${COMPONENTS}"
          echo "file=sbom-${IMAGE_ID}-cyclonedx.json" >> "${GITHUB_OUTPUT}"

      - name: Generate SPDX SBOM (Syft)
        id: sbom-spdx
        env:
          TARGET_WITH_DIGEST: ${{ env.ghcr_ref }}@${{ env.target_digest }}
          IMAGE_ID: ${{ inputs.image_id }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:v1.44.0@sha256:86fde6445b483d902fe011dd9f68c4987dd94e07da1e9edc004e3c2422650de6 \
            "${TARGET_WITH_DIGEST}" \
            -o spdx-json \
            > "sbom-${IMAGE_ID}-spdx.json"
          echo "file=sbom-${IMAGE_ID}-spdx.json" >> "${GITHUB_OUTPUT}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ inputs.image_id }}
          path: |
            sbom-${{ inputs.image_id }}-cyclonedx.json
            sbom-${{ inputs.image_id }}-spdx.json
          retention-days: 90

      # ---- signing and attestation (main branch only) -----------------------

      - name: Sign image with Cosign
        if: github.ref == 'refs/heads/main'
        env:
          TARGET_WITH_DIGEST: ${{ env.ghcr_ref }}@${{ env.target_digest }}
        run: |
          cosign sign --yes "${TARGET_WITH_DIGEST}"
          echo "Signed: ${TARGET_WITH_DIGEST}"

      - name: Attest CycloneDX SBOM with Cosign
        if: github.ref == 'refs/heads/main'
        env:
          TARGET_WITH_DIGEST: ${{ env.ghcr_ref }}@${{ env.target_digest }}
          SBOM_FILE: ${{ steps.sbom-cdx.outputs.file }}
        run: |
          cosign attest --yes \
            --predicate "${SBOM_FILE}" \
            --type cyclonedx \
            "${TARGET_WITH_DIGEST}"

      - name: Generate GitHub build provenance attestation
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.ghcr_image }}
          subject-digest: ${{ env.target_digest }}
          push-to-registry: true

      # ---- job outputs -------------------------------------------------------

      - name: Set job outputs
        id: set-outputs
        run: |
          echo "promoted=true"                   >> "${GITHUB_OUTPUT}"
          echo "target_ref=${ghcr_ref}"          >> "${GITHUB_OUTPUT}"
          echo "source_digest=${source_digest}"  >> "${GITHUB_OUTPUT}"
          echo "target_digest=${target_digest}"  >> "${GITHUB_OUTPUT}"

  # ===========================================================================
  # Update lock: write promotion entry to catalog/approved-lock.yaml
  # Runs only on main branch when write_lock=true and promote succeeded.
  # ===========================================================================
  update-lock:
    name: Update approved-lock for ${{ inputs.image_id }}
    needs: promote
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: inputs.write_lock && needs.promote.outputs.promoted == 'true' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # persist-credentials: false so the token is not written to .git/config.
      # This job uploads no artifacts, and the push step below sets an explicit
      # token-authenticated remote URL at runtime (zizmor artipacked).
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Configure git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # SANCTIONED EXCEPTION to the repo's "never push directly to main" rule:
      # this bot commits only catalog/approved-lock.yaml (machine-generated
      # promotion state) with [skip ci], gated on a successful promote on main.
      # The commit is currently unsigned; GPG-signing the bot commit requires a
      # dedicated signing key in secrets (tracked as A3 follow-up).
      - name: Update approved-lock with conflict-safe retry
        env:
          IMAGE_ID: ${{ inputs.image_id }}
          GHCR_REF: ${{ needs.promote.outputs.target_ref }}
          SOURCE_DIGEST: ${{ needs.promote.outputs.source_digest }}
          TARGET_DIGEST: ${{ needs.promote.outputs.target_digest }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install --quiet "pyyaml==6.0.3"

          # Mask the token and pass it only as a per-command auth header so it is
          # never written into .git/config (persist-credentials: false).
          echo "::add-mask::${GH_TOKEN}"
          AUTH_B64="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"
          AUTH_HEADER="AUTHORIZATION: basic ${AUTH_B64}"

          PROMOTED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MAX_RETRIES=5

          for ATTEMPT in $(seq 1 "${MAX_RETRIES}"); do
            # Discard any local lock edit, then rebase on latest main. A failed
            # rebase is the exact conflict this loop exists for: abort it and
            # retry instead of letting `set -e` kill the whole step.
            git checkout -- catalog/approved-lock.yaml 2>/dev/null || true
            if ! git -c http.extraheader="${AUTH_HEADER}" pull --rebase origin main; then
              git rebase --abort 2>/dev/null || true
              echo "::warning::pull --rebase failed on attempt ${ATTEMPT}/${MAX_RETRIES}; retrying."
              sleep $((ATTEMPT * 2))
              continue
            fi

            # A failure here is a real error (bad input, malformed lock), not a
            # retryable conflict.
            if ! python3 scripts/update_approved_lock.py \
                --lock-file catalog/approved-lock.yaml \
                --image-id "${IMAGE_ID}" \
                --ghcr-ref "${GHCR_REF}" \
                --source-digest "${SOURCE_DIGEST}" \
                --target-digest "${TARGET_DIGEST}" \
                --promoted-at "${PROMOTED_AT}" \
                --promoted-by "${RUN_URL}"; then
              echo "::error::Lock updater failed (non-retryable)."
              exit 1
            fi

            git add catalog/approved-lock.yaml
            if git diff --cached --quiet; then
              echo "Entry already present in lock file; nothing to commit."
              exit 0
            fi

            if ! git commit -m "chore(lock): promote ${IMAGE_ID} to approved-lock [skip ci]"; then
              echo "::error::git commit failed (non-retryable)."
              exit 1
            fi

            if git -c http.extraheader="${AUTH_HEADER}" push origin HEAD:main; then
              echo "Lock file updated successfully on attempt ${ATTEMPT}."
              exit 0
            fi

            echo "::warning::Push conflict on attempt ${ATTEMPT}/${MAX_RETRIES}; backing off $((ATTEMPT * 2))s..."
            # Drop our local commit by SHA so a rebase-introduced commit is never
            # discarded by a positional reset.
            COMMIT_SHA="$(git rev-parse HEAD)"
            git reset --hard "${COMMIT_SHA}~1"
            sleep $((ATTEMPT * 2))
          done

          echo "::error::Failed to push approved-lock update after ${MAX_RETRIES} attempts."
          exit 1
